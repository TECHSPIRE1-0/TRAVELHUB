<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – TravelHub</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">



<div class="auth-wrapper">
  <div class="auth-visual">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800&q=80" alt="Travel" />
    <div class="auth-visual-overlay">
      <h2>"The world is a book, and those who do not travel read only one page."</h2>
      <p>— Saint Augustine</p>
    </div>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form-inner">
      <div class="auth-logo">Travel<span>Hub</span></div>
      <h1>Welcome back</h1>
      <p class="auth-sub">Sign in to continue your journey</p>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabTraveller">Traveller</button>
        <button class="auth-tab" id="tabAgency">Travel Agency</button>
      </div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label>Password <a href="#" class="forgot-link">Forgot password?</a></label>
          <div class="input-password">
            <input type="password" id="passwordInput" placeholder="Enter your password" required />
            <button type="button" class="toggle-pw" id="togglePw">👁</button>
          </div>
        </div>
        <label class="checkbox-opt">
          <input type="checkbox" /> Remember me for 30 days
        </label>
        <button type="submit" class="btn-primary btn-lg w-full">Sign In →</button>
      </form>

      <div class="auth-divider"><span>or continue with</span></div>
      <div class="social-auth">
        <button class="social-btn"><span>G</span> Google</button>
        <button class="social-btn"><span>f</span> Facebook</button>
      </div>
      <p class="auth-switch">Don't have an account? <a href="register.html">Create one free →</a></p>
    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
