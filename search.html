<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore Destinations – TravelHub</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="search-page">

<nav class="nav scrolled" id="nav">
  <div class="nav-logo">Travel<span>Hub</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="search.html" class="active">Explore</a></li>
    <li><a href="agency-profile.html">Agencies</a></li>
    <li><a href="booking.html">Book</a></li>
  </ul>
  <div class="nav-actions">
    <a href="login.html" class="btn-outline">Sign In</a>
    <a href="register.html" class="btn-primary">Join Free</a>
  </div>
  <button class="nav-toggle" id="navToggle">&#9776;</button>
</nav>

<!-- SEARCH HEADER -->
<div class="search-header">
  <div class="container">
    <h1>Explore <em>Destinations</em></h1>
    <div class="search-bar-full">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Search destination, agency, or package…" />
      <button class="search-btn" id="searchBtn">Search</button>
    </div>
    <div class="filter-row">
      <select id="filterBudget">
        <option value="">💰 Any Budget</option>
        <option value="5000">Under ₹5,000</option>
        <option value="10000">Under ₹10,000</option>
        <option value="20000">Under ₹20,000</option>
        <option value="50000">Under ₹50,000</option>
      </select>
      <select id="filterDuration">
        <option value="">📅 Any Duration</option>
        <option value="3">1–3 Days</option>
        <option value="7">4–7 Days</option>
        <option value="14">8–14 Days</option>
        <option value="30">15+ Days</option>
      </select>
      <select id="filterType">
        <option value="">🏷️ Trip Type</option>
        <option value="adventure">Adventure</option>
        <option value="beach">Beach</option>
        <option value="heritage">Heritage</option>
        <option value="wildlife">Wildlife</option>
        <option value="honeymoon">Honeymoon</option>
        <option value="family">Family</option>
      </select>
      <select id="filterRating">
        <option value="">⭐ Any Rating</option>
        <option value="4.5">4.5+ Stars</option>
        <option value="4">4+ Stars</option>
        <option value="3.5">3.5+ Stars</option>
      </select>
      <button class="filter-clear" id="clearFilters">Clear All</button>
    </div>
  </div>
</div>

<!-- RESULTS AREA -->
<div class="search-body container">
  <div class="results-meta">
    <p id="resultsCount">Showing <strong>24 agencies</strong> matching your search</p>
    <select id="sortBy">
      <option value="rating">Sort: Top Rated</option>
      <option value="price_low">Sort: Price Low–High</option>
      <option value="price_high">Sort: Price High–Low</option>
      <option value="reviews">Sort: Most Reviews</option>
    </select>
  </div>

  <div class="results-grid" id="resultsGrid">
    <!-- Cards rendered by JS -->
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<footer class="footer">
  <div class="footer-bottom">
    <p>© 2025 TravelHub. All rights reserved.</p>
  </div>
</footer>

<script src="search.js"></script>
</body>
</html>
